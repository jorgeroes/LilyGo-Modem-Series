[env]
platform = espressif32@6.12.0
framework = arduino
monitor_speed = 115200

[esp32dev_base]
board = esp32dev
build_flags =
        ${env.build_flags}
        -mfix-esp32-psram-cache-issue
        -DBOARD_HAS_PSRAM
monitor_filters =
        default
        esp32_exception_decoder

[esp32s3_base]
board = esp32s3box
build_flags =
    ${env.build_flags}
;     -UARDUINO_USB_CDC_ON_BOOT
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
monitor_filters =
        time
        default
        esp32_exception_decoder

[env:T-A7670X]
extends = esp32dev_base
build_flags = ${esp32dev_base.build_flags}
            -DLILYGO_T_A7670

[env:T-Call-A7670X-V1-0]
extends = esp32dev_base
build_flags = ${esp32dev_base.build_flags}
            -DLILYGO_T_CALL_A7670_V1_0

[env:T-Call-A7670X-V1-1]
extends = esp32dev_base
build_flags = ${esp32dev_base.build_flags}
            -DLILYGO_T_CALL_A7670_V1_1

;!==============================PCIE VARIANT====================================
[env:T-PCIE-A7670X]
extends = esp32dev_base
build_flags = ${esp32dev_base.build_flags}
            -DLILYGO_T_PCIE_A767X

;! ===============================ETH-Elite VARIANT================================
[env:T-ETH-ELITE-A7670X]
extends = esp32s3_base
build_flags =
            ${esp32s3_base.build_flags}
            -DLILYGO_T_ETH_ELITE_A7670X

;! ===============================STANDARD SERIES VARIANT================================
; ! Standard interface board, different from others, uses standard interface, the only difference is the modem
[SIMCOM_STANDARD]
build_flags =
        -DLILYGO_SIMCOM_STANDARD_PIN
        ; -UARDUINO_USB_CDC_ON_BOOT
        -DARDUINO_USB_CDC_ON_BOOT=1
        -DCORE_DEBUG_LEVEL=0
monitor_filters =
        time
        default
        esp32_exception_decoder

[env:T-A7670X-S3-Standard]
board = esp32-s3-wroom-1-n16r2
build_flags =
        -DLILYGO_A7670X_S3_STAN
        ${SIMCOM_STANDARD.build_flags}
monitor_filters =
        send_on_enter
        default
        esp32_exception_decoder
monitor_echo = yes
monitor_eol = CRLF
lib_deps =
        https://github.com/Seeed-Studio/Seeed_Arduino_LIS3DHTR
        bblanchon/ArduinoJson @ ^7.0.4

;! ===============================Internet-Com VARIANT================================
[env:T-InternetCOM-A7670X]
extends = esp32s3_base
build_flags =
        ${esp32s3_base.build_flags}
        -DLILYGO_T_INTERNET_COM_A7670X


