;PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
lib_dir    = references/lib
boards_dir = references/boards

; ── Selección de firmware ───────────────────────────────────────────────────
; Descomentar UNA línea para elegir qué firmware compilar.
; Sin ninguna descomentada, PlatformIO toma `src/` por defecto (logger).
src_dir = src
; src_dir = tests/modem_at      ; Test 1: AT response (sin SIM)
; src_dir = tests/modem_sim     ; Test 2: SIM + registro de red
; src_dir = tests/modem_data    ; Test 3: sesión de datos (ping + HTTP GET)
